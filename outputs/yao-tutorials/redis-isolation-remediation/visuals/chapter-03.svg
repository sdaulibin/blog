<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="目标架构——按业务物理拆分实例" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#e8e4da" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1f4e79" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f8f6f1"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#ffffff" stroke="#d9d6cc" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#f8f6f1" stroke="#d9d6cc" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1f4e79" font-size="12" font-weight="800" letter-spacing="1.2">第3章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5f6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1f4e79"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">目标架构——按业务物理拆分实例</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5f6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">展示4台VM上部署5套独立Redis实例的拓扑，包含各VM的Master/Slave分布和5节点共用Sentinel</tspan><tspan x="84.0" dy="19">集群。</tspan></text>
  <text x="168" y="222" fill="#5f6673" font-size="12" font-weight="700">越往下越接近底层机制，越往上越接近用户可见结果</text>
  <rect x="168.0" y="236.0" width="864.0" height="54.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="168.0" y="236.0" width="7" height="54.0" rx="3.5" fill="#1f4e79"/>
  <text x="198.0" y="270.0" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="198.0" dy="0">VM-1 (16c32g)</tspan></text>
  <text x="1008.0" y="268.0" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="1008.0" dy="0">基金Master:6379 +</tspan></text>
  <rect x="196.0" y="302.0" width="808.0" height="54.0" rx="8" fill="#f7f5ee" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="196.0" y="302.0" width="7" height="54.0" rx="3.5" fill="#1f4e79"/>
  <text x="226.0" y="336.0" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="226.0" dy="0">VM-2 (16c32g)</tspan></text>
  <text x="980.0" y="334.0" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="980.0" dy="0">贵金属Master:6380 +</tspan></text>
  <rect x="224.0" y="368.0" width="752.0" height="54.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="224.0" y="368.0" width="7" height="54.0" rx="3.5" fill="#1f4e79"/>
  <text x="254.0" y="402.0" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="254.0" dy="0">VM-3 (16c32g)</tspan></text>
  <text x="952.0" y="400.0" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="952.0" dy="0">理财Master:6381 +</tspan></text>
  <rect x="252.0" y="434.0" width="696.0" height="54.0" rx="8" fill="#f7f5ee" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="252.0" y="434.0" width="7" height="54.0" rx="3.5" fill="#1f4e79"/>
  <text x="282.0" y="468.0" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="282.0" dy="0">VM-4 (16c32g)</tspan></text>
  <text x="924.0" y="466.0" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="924.0" dy="0">信托Master:6382 +</tspan></text>
  <rect x="280.0" y="500.0" width="640.0" height="54.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="280.0" y="500.0" width="7" height="54.0" rx="3.5" fill="#1f4e79"/>
  <text x="310.0" y="534.0" text-anchor="start" fill="#111827" font-size="19" font-weight="780"><tspan x="310.0" dy="0">5节点共用Sentinel集群</tspan></text>
  <text x="896.0" y="532.0" text-anchor="end" fill="#5f6673" font-size="13" font-weight="560"><tspan x="896.0" dy="0">监控全部5个Master | 仲裁多数=3</tspan></text>
</svg>
